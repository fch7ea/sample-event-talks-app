<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Tweet Composer -->
        <header class="header">
            <div class="brand">
                <div class="logo-container">
                    <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2005/Atom">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" fill="currentColor"/>
                        <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z" fill="currentColor"/>
                    </svg>
                </div>
                <div>
                    <h1>BigQuery Insights</h1>
                    <p class="subtitle">Real-time Release Feed</p>
                </div>
            </div>
            
            <div class="actions">
                <button id="theme-toggle" class="btn btn-secondary" title="Toggle Theme">
                    <svg class="icon theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="icon theme-icon-light hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <button id="export-csv-btn" class="btn btn-secondary hidden">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    <span>Export CSV</span>
                </button>
                <button id="refresh-btn" class="btn btn-primary">
                    <svg class="spinner-icon icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                    <span>Refresh Feed</span>
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Left Pane: Release Notes Feed -->
            <section class="feed-section">
                <div class="section-header">
                    <h2>Latest Releases</h2>
                    <span id="update-count" class="badge-count">Loading...</span>
                </div>

                <div class="filter-toolbar">
                    <div class="search-wrapper">
                        <svg class="search-icon icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="search-input" placeholder="Search release notes...">
                    </div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="feature">Features</button>
                        <button class="filter-btn" data-filter="issue">Issues</button>
                        <button class="filter-btn" data-filter="deprecation">Deprecations</button>
                    </div>
                </div>
                
                <div id="error-message" class="error-container hidden">
                    <div class="error-card">
                        <h3>Oops! Failed to load updates</h3>
                        <p id="error-text">Check your internet connection or try again later.</p>
                        <button id="retry-btn" class="btn btn-secondary">Try Again</button>
                    </div>
                </div>

                <div id="loading-skeleton" class="skeleton-container">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>

                <div id="feed-container" class="feed-container"></div>
            </section>

            <!-- Right Pane: Tweet composer / details panel -->
            <section class="details-section">
                <div class="composer-card sticky">
                    <div class="composer-header">
                        <div class="composer-icon-container">
                            <!-- Custom X / Twitter SVG -->
                            <svg class="x-logo" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                        </div>
                        <div>
                            <h3>Tweet Composer</h3>
                            <p class="composer-subtitle">Share release notes instantly</p>
                        </div>
                    </div>
                    
                    <div id="no-selection-state" class="no-selection-state">
                        <svg class="draft-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                        <p>Select any update from the feed to compose a tweet.</p>
                    </div>

                    <div id="composer-state" class="composer-state hidden">
                        <div class="selected-meta">
                            <span id="selected-type-badge" class="badge">Feature</span>
                            <span id="selected-date" class="date-text">June 15, 2026</span>
                        </div>
                        
                        <div class="textarea-wrapper">
                            <textarea id="tweet-textarea" rows="8" placeholder="What's happening?"></textarea>
                            <div class="char-counter-container">
                                <span id="char-counter">0</span>/280
                            </div>
                        </div>

                        <div class="composer-footer">
                            <button id="tweet-btn" class="btn btn-twitter">
                                <svg class="twitter-icon icon" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                </svg>
                                <span>Tweet This</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
